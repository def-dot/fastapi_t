# docker compose up
services:
  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.file=true"
      - "--providers.file.filename=/etc/traefik/traefik.yml"
      - "--entrypoints.api.address=:80"
    ports:
      - "80:80"
      - "8080:8080"

  backend:
    ports:
      - "${BACKEND_PORT:-8000}:8000"
