name: Add to project

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to project
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e
        with:
          project-url: https://github.com/users/def-dot/projects/1
