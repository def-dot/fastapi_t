# 手动部署： bash deploy.sh
# docker compose --env-file .env.production -f compose.yml -f compose.prod.yml up -d
services:
  db:
    restart: always

  db_migrate:
    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_TAG}
    profiles:
      - migrate

  backend:
    image: ${DOCKER_REGISTRY}/${DOCKER_IMAGE}:${DOCKER_TAG}
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true

  traefik:
    restart: always

  db_backup:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER?variable not set}
      POSTGRES_DB: ${POSTGRES_DB?variable not set}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backup/crontab:/etc/crontabs/root:ro
      - ./backups:/backups
    entrypoint: ["crond", "-f", "-l", "2"]
